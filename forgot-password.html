<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
  <meta name="robots" content="index, follow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contraseña — HogarFast</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    body { background: var(--gray-50); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    .auth-nav { background: white; border-bottom: 1px solid var(--gray-200); padding: 0.9rem 5%; display: flex; align-items: center; position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
    .logo { font-size: 1.4rem; font-weight: 900; color: var(--primary); text-decoration: none; }
    .logo span { color: var(--accent); }
    .card { background: white; border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); padding: 2.5rem; width: 100%; max-width: 420px; margin-top: 5rem; }
    .card-icon { font-size: 3rem; text-align: center; margin-bottom: 1.2rem; }
    .card h1 { font-size: 1.6rem; font-weight: 900; color: var(--gray-900); text-align: center; margin-bottom: 0.4rem; }
    .card p { color: var(--gray-500); font-size: 0.88rem; text-align: center; margin-bottom: 1.8rem; line-height: 1.6; }
    .alert { display: none; padding: 0.85rem 1rem; border-radius: var(--radius); font-size: 0.85rem; font-weight: 600; margin-bottom: 1.2rem; }
    .alert-success { background: #d1fae5; border: 1px solid #6ee7b7; color: #065f46; display: block; }
    .alert-error { background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; display: block; }
    .back-link { text-align: center; margin-top: 1.5rem; font-size: 0.86rem; }
    .back-link a { color: var(--primary); font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>

<nav class="auth-nav">
  <a href="index.html" class="logo">Hogar<span>Fast</span></a>
</nav>

<div class="card">
  <div class="card-icon">🔐</div>
  <h1>¿Olvidaste tu contraseña?</h1>
  <p>Introduce tu email y te enviaremos un enlace para restablecer tu contraseña.</p>

  <div class="alert" id="msg"></div>

  <form onsubmit="sendReset(event)" id="reset-form">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" id="fp-email" placeholder="tu@email.com" required autocomplete="email" />
    </div>
    <button type="submit" class="btn btn-primary btn-block btn-lg" id="fp-btn" style="width:100%;justify-content:center;">
      Enviar enlace de recuperación
    </button>
  </form>

  <div class="back-link"><a href="login.html">← Volver al inicio de sesión</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const _sb = supabase.createClient(
    'https://ubncebdkqzxxmhhmzcgw.supabase.co',
    'sb_publishable_mIPl86ERFL0HHsr1T4SL0A_GGFTo-py'
  );

  async function sendReset(e) {
    e.preventDefault();
    const btn = document.getElementById('fp-btn');
    const msgEl = document.getElementById('msg');
    const email = document.getElementById('fp-email').value.trim();

    btn.textContent = 'Enviando...';
    btn.disabled = true;
    msgEl.className = 'alert';
    msgEl.style.display = 'none';

    try {
      const { error } = await _sb.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://hogarfast.com/reset-password.html'
      });
      if (error) throw error;

      msgEl.textContent = '✅ ¡Email enviado! Revisa tu bandeja de entrada (y spam).';
      msgEl.className = 'alert alert-success';
      document.getElementById('reset-form').style.display = 'none';
    } catch (err) {
      msgEl.textContent = '❌ Error: ' + (err.message || 'Inténtalo de nuevo.');
      msgEl.className = 'alert alert-error';
      btn.textContent = 'Enviar enlace de recuperación';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
