let minRating = 0;

function renderPros(list) {
  const grid = document.getElementById('pros-grid');
  document.getElementById('results-count').textContent = list.length + ' profesionales encontrados';

  if (list.length === 0) {
    grid.innerHTML = `<div class="no-results" style="grid-column:1/-1;">
      <div class="icon">🔍</div>
      <h3>No encontramos profesionales</h3>
      <p>Prueba con otros filtros o ciudad.</p>
    </div>`;
    return;
  }

  grid.innerHTML = list.map(p => `
    <a href="pro-profile.html?id=${p.id}" class="pro-card">
      <div class="pro-card-top">
        <div class="avt-wrap">
          <div class="pro-avt ${p.grad}">${p.initials}</div>
          ${p.verified ? '<div class="avt-verified" style="width:20px;height:20px;font-size:0.6rem;">✓</div>' : ''}
        </div>
        <div class="pro-header-info">
          <div class="name">${p.name}</div>
          <div class="service">${p.service}</div>
        </div>
        ${p.verified ? '<div class="verified-badge">✓ Verificado</div>' : ''}
      </div>
      <div class="pro-card-body">
        <div class="pro-meta">
          <div class="pro-meta-item">⭐ <strong>${p.rating}</strong></div>
          <div class="pro-meta-item">✅ ${p.jobs} trabajos</div>
          <div class="pro-meta-item">📍 ${p.city}</div>
        </div>
        <div class="pro-bio">${p.bio}</div>
        <div class="pro-tags">${p.tags.map(t => `<span class="pro-tag">${t}</span>`).join('')}</div>
        <div class="pro-footer">
          <div class="pro-price">${p.price}€ <small>/ hora</small></div>
          <div class="btn btn-primary btn-sm">Ver perfil →</div>
        </div>
      </div>
    </a>
  `).join('');
}

function applyFilters() {
  const service = document.getElementById('f-service').value;
  const city = document.getElementById('f-city-input').value.trim();
  const sort = document.getElementById('f-sort').value;

  let filtered = pros.filter(p => {
    if (service && p.service !== service) return false;
    if (city && !p.city.toLowerCase().includes(city.toLowerCase())) return false;
    if (p.rating < minRating) return false;
    return true;
  });

  if (sort === 'rating') filtered.sort((a,b) => b.rating - a.rating);
  else if (sort === 'price_asc') filtered.sort((a,b) => a.price - b.price);
  else if (sort === 'price_desc') filtered.sort((a,b) => b.price - a.price);
  else if (sort === 'jobs') filtered.sort((a,b) => b.jobs - a.jobs);

  renderPros(filtered);
}

function filterRating(btn, rating) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  minRating = rating;
  applyFilters();
}

// CITY AUTOCOMPLETE
const cityInput = document.getElementById('f-city-input');
const cityDrop  = document.getElementById('f-city-drop');
let acIndex = -1;

cityInput.addEventListener('input', function () {
  const q = this.value.trim().toLowerCase();
  applyFilters();
  if (q.length < 1) { hideDrop(); return; }
  const matches = CITIES.filter(c => c.toLowerCase().includes(q)).slice(0, 8);
  if (!matches.length) { hideDrop(); return; }
  cityDrop.innerHTML = matches.map(c =>
    `<div class="city-item" onmousedown="pickCity('${c}')">📍 ${c}</div>`
  ).join('');
  cityDrop.style.display = 'block';
  acIndex = -1;
});

cityInput.addEventListener('keydown', function (e) {
  const items = cityDrop.querySelectorAll('.city-item');
  if (e.key === 'ArrowDown') { acIndex = Math.min(acIndex + 1, items.length - 1); highlightAC(items); e.preventDefault(); }
  else if (e.key === 'ArrowUp') { acIndex = Math.max(acIndex - 1, 0); highlightAC(items); e.preventDefault(); }
  else if (e.key === 'Enter' && acIndex >= 0) { items[acIndex].dispatchEvent(new MouseEvent('mousedown')); e.preventDefault(); }
  else if (e.key === 'Escape') { hideDrop(); }
});

cityInput.addEventListener('blur', () => setTimeout(hideDrop, 150));

function highlightAC(items) {
  items.forEach((it, i) => it.classList.toggle('active', i === acIndex));
  if (items[acIndex]) items[acIndex].scrollIntoView({ block: 'nearest' });
}

function pickCity(name) {
  cityInput.value = name;
  hideDrop();
  applyFilters();
}

function hideDrop() { cityDrop.style.display = 'none'; acIndex = -1; }

// Init
renderPros(pros);

// URL params
const params = new URLSearchParams(window.location.search);
if (params.get('service')) {
  document.getElementById('f-service').value = params.get('service');
  applyFilters();
}
if (params.get('city')) {
  cityInput.value = params.get('city');
  applyFilters();
}
</script>
