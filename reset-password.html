<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
  <meta name="robots" content="index, follow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nueva contraseña — HogarFast</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    body { background: var(--gray-50); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    .auth-nav { background: white; border-bottom: 1px solid var(--gray-200); padding: 0.9rem 5%; display: flex; align-items: center; position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
    .logo { font-size: 1.4rem; font-weight: 900; color: var(--primary); text-decoration: none; }
    .logo span { color: var(--accent); }
    .card { background: white; border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); padding: 2.5rem; width: 100%; max-width: 420px; margin-top: 5rem; }
    .card-icon { font-size: 3rem; text-align: center; margin-bottom: 1.2rem; }
    .card h1 { font-size: 1.6rem; font-weight: 900; color: var(--gray-900); text-align: center; margin-bottom: 0.4rem; }
    .card p { color: var(--gray-500); font-size: 0.88rem; text-align: center; margin-bottom: 1.8rem; line-height: 1.6; }
    .alert { padding: 0.85rem 1rem; border-radius: var(--radius); font-size: 0.85rem; font-weight: 600; margin-bottom: 1.2rem; }
    .alert-success { background: #d1fae5; border: 1px solid #6ee7b7; color: #065f46; }
    .alert-error { background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 2.8rem; }
    .pw-toggle { position: absolute; right: 0.9rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--gray-400); font-size: 1rem; }
    .pw-strength { display: flex; gap: 3px; margin-top: 0.4rem; }
    .pw-bar { height: 3px; flex: 1; border-radius: 3px; background: var(--gray-200); transition: background 0.2s; }
    .pw-bar.weak { background: #ef4444; }
    .pw-bar.ok { background: #f59e0b; }
    .pw-bar.strong { background: #10b981; }
    .pw-label { font-size: 0.72rem; color: var(--gray-400); margin-top: 0.25rem; }
    .error-state .card-icon::after { content: ''; }
  </style>
</head>
<body>

<nav class="auth-nav">
  <a href="index.html" class="logo">Hogar<span>Fast</span></a>
</nav>

<div class="card" id="main-card">
  <div class="card-icon">🔑</div>
  <h1>Nueva contraseña</h1>
  <p>Introduce tu nueva contraseña. Debe tener al menos 8 caracteres.</p>

  <div class="alert alert-error" id="error-msg" style="display:none;"></div>

  <form onsubmit="updatePassword(event)" id="pw-form">
    <div class="form-group">
      <label class="form-label">Nueva contraseña</label>
      <div class="pw-wrap">
        <input type="password" class="form-control" id="new-pw" placeholder="Mínimo 8 caracteres" required autocomplete="new-password" oninput="checkStrength(this.value)" />
        <button type="button" class="pw-toggle" onclick="togglePw('new-pw', this)">👁</button>
      </div>
      <div class="pw-strength">
        <div class="pw-bar" id="b1"></div><div class="pw-bar" id="b2"></div>
        <div class="pw-bar" id="b3"></div><div class="pw-bar" id="b4"></div>
      </div>
      <div class="pw-label" id="pw-label">Introduce una contraseña</div>
    </div>
    <div class="form-group">
      <label class="form-label">Confirmar contraseña</label>
      <div class="pw-wrap">
        <input type="password" class="form-control" id="confirm-pw" placeholder="Repite la contraseña" required autocomplete="new-password" />
        <button type="button" class="pw-toggle" onclick="togglePw('confirm-pw', this)">👁</button>
      </div>
    </div>
    <button type="submit" class="btn btn-primary btn-block btn-lg" id="update-btn" style="width:100%;justify-content:center;">
      Guardar nueva contraseña
    </button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const _sb = supabase.createClient(
    'https://ubncebdkqzxxmhhmzcgw.supabase.co',
    'sb_publishable_mIPl86ERFL0HHsr1T4SL0A_GGFTo-py'
  );

  function togglePw(id, btn) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.textContent = input.type === 'password' ? '👁' : '🙈';
  }

  function checkStrength(pw) {
    const bars = ['b1','b2','b3','b4'].map(id => document.getElementById(id));
    const label = document.getElementById('pw-label');
    bars.forEach(b => b.className = 'pw-bar');
    if (!pw) { label.textContent = 'Introduce una contraseña'; return; }
    let score = 0;
    if (pw.length >= 8) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const cls = score <= 1 ? 'weak' : score <= 2 ? 'ok' : 'strong';
    const labels = ['','Débil','Débil','Buena','Muy segura'];
    for (let i = 0; i < score; i++) bars[i].classList.add(cls);
    label.textContent = labels[score];
    label.style.color = cls === 'weak' ? '#ef4444' : cls === 'ok' ? '#f59e0b' : '#10b981';
  }

  async function updatePassword(e) {
    e.preventDefault();
    const pw = document.getElementById('new-pw').value;
    const pw2 = document.getElementById('confirm-pw').value;
    const errEl = document.getElementById('error-msg');
    const btn = document.getElementById('update-btn');

    errEl.style.display = 'none';

    if (pw !== pw2) {
      errEl.textContent = 'Las contraseñas no coinciden.';
      errEl.style.display = 'block';
      return;
    }
    if (pw.length < 8) {
      errEl.textContent = 'La contraseña debe tener al menos 8 caracteres.';
      errEl.style.display = 'block';
      return;
    }

    btn.textContent = 'Guardando...';
    btn.disabled = true;

    try {
      const { error } = await _sb.auth.updateUser({ password: pw });
      if (error) throw error;

      document.getElementById('main-card').innerHTML = `
        <div class="card-icon">✅</div>
        <h1>¡Contraseña actualizada!</h1>
        <p>Tu contraseña ha sido cambiada correctamente. Ya puedes iniciar sesión.</p>
        <a href="login.html" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:1rem;">Iniciar sesión →</a>
      `;
    } catch (err) {
      errEl.textContent = '❌ Error: ' + (err.message || 'Enlace expirado. Solicita uno nuevo.');
      errEl.style.display = 'block';
      btn.textContent = 'Guardar nueva contraseña';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
